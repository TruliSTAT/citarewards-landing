<svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="baseF" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="15%" stop-color="#fef3c7"/>
      <stop offset="35%" stop-color="#fde68a"/>
      <stop offset="58%" stop-color="#f59e0b"/>
      <stop offset="80%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="fieldF" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="22%" stop-color="#fef3c7"/>
      <stop offset="42%" stop-color="#fcd34d"/>
      <stop offset="68%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="markF" cx="32%" cy="26%" r="70%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="25%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>
    <radialGradient id="rimF" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#451a03"/>
    </radialGradient>
    <linearGradient id="shineF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="shineF2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <filter id="dropShadowF" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#451a03" flood-opacity="0.5"/>
    </filter>
    <filter id="embossF">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="1" dy="1.5" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- DROP SHADOW -->
  <circle cx="102" cy="103" r="92" fill="#451a03" opacity="0.4" filter="url(#dropShadowF)"/>

  <!-- OUTER RIM (darkest, gives depth) -->
  <circle cx="100" cy="100" r="97" fill="url(#rimF)"/>

  <!-- COIN BODY -->
  <circle cx="100" cy="100" r="92" fill="url(#baseF)"/>

  <!-- MILLED EDGE — classic coin serration -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1.2" stroke-dasharray="2.6,3.1"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>

  <!-- FACE FIELD (raised relief surface) -->
  <circle cx="100" cy="100" r="84" fill="url(#fieldF)"/>

  <!-- FACE BORDER RINGS -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="url(#markF)" stroke-width="1.8" opacity="0.75"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#markF)" stroke-width="0.7" opacity="0.4"/>

  <!-- ═══════════════════════════════════ -->
  <!-- CITAMARK CENTER — SACRED GEOMETRY  -->
  <!-- ═══════════════════════════════════ -->
  <g transform="translate(100,100)" filter="url(#embossF)">

    <!-- Construction circle (subtle) -->
    <circle cx="0" cy="0" r="46" fill="none" stroke="url(#markF)" stroke-width="0.6" stroke-dasharray="1.8,2.8" opacity="0.38"/>

    <!-- OUTER HEXAGON (the CitaMark primary shape) -->
    <polygon points="0,-46 39.8,-23 39.8,23 0,46 -39.8,23 -39.8,-23"
      fill="rgba(251,191,36,0.06)"
      stroke="url(#markF)" stroke-width="2.8" stroke-linejoin="round" opacity="0.92"/>

    <!-- ROTATED HEXAGON (creates the star fill between) -->
    <polygon points="23,-39.8 46,0 23,39.8 -23,39.8 -46,0 -23,-39.8"
      fill="rgba(251,191,36,0.04)"
      stroke="url(#markF)" stroke-width="1.5" stroke-linejoin="round" opacity="0.52"/>

    <!-- SQUARE (0°) — the upright diamond -->
    <rect x="-29" y="-29" width="58" height="58"
      fill="rgba(251,191,36,0.05)"
      stroke="url(#markF)" stroke-width="2.8" stroke-linejoin="round" opacity="0.9"/>

    <!-- SQUARE (45°) — the rotated diamond — creates the ◈ sacred mark -->
    <rect x="-29" y="-29" width="58" height="58"
      fill="rgba(251,191,36,0.03)"
      stroke="url(#markF)" stroke-width="1.8" stroke-linejoin="round" opacity="0.62"
      transform="rotate(45)"/>

    <!-- INNER CIRCLE — the eye of the mark -->
    <circle cx="0" cy="0" r="19" fill="none" stroke="url(#markF)" stroke-width="2.2" opacity="0.88"/>
    <circle cx="0" cy="0" r="13" fill="none" stroke="url(#markF)" stroke-width="1" opacity="0.5"/>

    <!-- 4 CARDINAL TICK MARKS — precision instrument feel -->
    <line x1="0" y1="-46" x2="0" y2="-38" stroke="url(#markF)" stroke-width="3" stroke-linecap="round" opacity="0.92"/>
    <line x1="46" y1="0" x2="38" y2="0" stroke="url(#markF)" stroke-width="3" stroke-linecap="round" opacity="0.92"/>
    <line x1="0" y1="46" x2="0" y2="38" stroke="url(#markF)" stroke-width="3" stroke-linecap="round" opacity="0.92"/>
    <line x1="-46" y1="0" x2="-38" y2="0" stroke="url(#markF)" stroke-width="3" stroke-linecap="round" opacity="0.92"/>

    <!-- 4 CORNER JEWEL DOTS (diamond vertices) -->
    <circle cx="0" cy="-29" r="3.2" fill="url(#markF)" opacity="0.95"/>
    <circle cx="29" cy="0" r="3.2" fill="url(#markF)" opacity="0.95"/>
    <circle cx="0" cy="29" r="3.2" fill="url(#markF)" opacity="0.95"/>
    <circle cx="-29" cy="0" r="3.2" fill="url(#markF)" opacity="0.95"/>

    <!-- 6 HEX CORNER DOTS -->
    <circle cx="0" cy="-46" r="2.2" fill="url(#markF)" opacity="0.7"/>
    <circle cx="39.8" cy="-23" r="2.2" fill="url(#markF)" opacity="0.7"/>
    <circle cx="39.8" cy="23" r="2.2" fill="url(#markF)" opacity="0.7"/>
    <circle cx="0" cy="46" r="2.2" fill="url(#markF)" opacity="0.7"/>
    <circle cx="-39.8" cy="23" r="2.2" fill="url(#markF)" opacity="0.7"/>
    <circle cx="-39.8" cy="-23" r="2.2" fill="url(#markF)" opacity="0.7"/>

    <!-- CENTER JEWEL -->
    <circle cx="0" cy="0" r="7" fill="url(#markF)" opacity="0.97"/>
    <circle cx="0" cy="0" r="3.5" fill="rgba(255,248,231,0.6)" opacity="0.9"/>

  </g>

  <!-- RIM TEXT — top arc -->
  <path id="rimTop" d="M100,100 m-78,0 a78,78 0 1,1 156,0 a78,78 0 1,1 -156,0" fill="none"/>
  <text font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="6.8" letter-spacing="2.9" fill="url(#markF)" opacity="0.85">
    <textPath href="#rimTop" startOffset="2%">CITACOIN · THE CURRENCY OF THE TRADES ·</textPath>
  </text>

  <!-- RIM TEXT — bottom arc -->
  <path id="rimBot" d="M35,100 a65,65 0 0,0 130,0" fill="none"/>
  <text font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="5.8" letter-spacing="2.4" fill="url(#markF)" opacity="0.58">
    <textPath href="#rimBot" startOffset="10%">EST. MMXXVI</textPath>
  </text>

  <!-- HIGHLIGHT SHEEN (top-left sphere illusion) -->
  <ellipse cx="68" cy="60" rx="38" ry="22" fill="url(#shineF)" transform="rotate(-38,68,60)" opacity="0.6"/>

  <!-- COUNTER-SHADOW (bottom-right depth) -->
  <ellipse cx="135" cy="142" rx="34" ry="20" fill="url(#shineF2)" transform="rotate(-38,135,142)" opacity="0.5"/>

  <!-- BEVEL EDGE HIGHLIGHT -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.4"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(0,0,0,0.22)" stroke-width="0.8"/>
</svg>
